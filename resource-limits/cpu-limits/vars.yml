# CPU Limits Test Configuration Variables
# This file defines all variables used in the cpu-limits test
#
# Usage Examples:
#
# Simplest - uses run-test.sh wrapper (recommended):
#   ./run-test.sh
#
# With overrides (NOTE: Variable names are case-sensitive!):
#   cpuSockets=4 ./run-test.sh              # Correct: cpuSockets (camelCase)
#   cpuSockets=128 ./run-test.sh --log-level=debug
#
# Common mistakes to avoid:
#   cpusockets=4 ./run-test.sh              # WRONG: lowercase won't work
#   CPUSOCKETS=4 ./run-test.sh              # WRONG: uppercase won't work
#
# Advanced - direct kube-burner (requires manual timestamp):
#   runTimestamp=$(date +"run-%Y%m%d-%H%M%S") cpuSockets=4 kube-burner init --config=cpu-limits-test.yml --user-data=vars.yml
#

# Test Configuration
testNamespace: "cnv-cpu-limits"            # Namespace where test resources will be created
testName: 'cnv-cpu-limits'                 # Test identifier used for labeling and metrics (ES index)
resultsPath: "/tmp/kube-burner-results/cpu-limits"  # Base directory for test results
runTimestamp: "run-default"               # Auto-generated by run-test.sh

# VM Configuration
vmCount: 1                                 # Number of VMs to create for testing

# CPU Configuration (sockets topology per KCS 7086635)
# Total vCPUs = cpuCores * cpuSockets. Keep cpuCores=1 and scale via sockets.
cpuCores: 1                                # CPU cores per socket (keep at 1)
cpuSockets: 512                            # Number of sockets (= total vCPUs when cpuCores=1)
cpuMaxSockets: 512                         # Max sockets (hotplug upper bound)
bootloaderEfi: false                       # EFI bootloader (disable per CNV-66505 for high vCPU)

# Resource Configuration
memory: "8Gi"                              # Memory allocation per VM
storage: "10Gi"                            # Storage size for VM disk

# Storage Configuration
storageClassName: "ocs-storagecluster-ceph-rbd"  # Storage class for PVC provisioning

# VM Image Configuration
imageUrl: "https://dl.fedoraproject.org/pub/fedora/linux/releases/42/Cloud/x86_64/images/Fedora-Cloud-Base-Generic-42-1.1.x86_64.qcow2"  # Fedora cloud image URL

# Test Execution Control
counter: 1                                 # Test iteration counter (0 triggers cleanup)
vmRunning: true                            # Whether VMs should start immediately

# Timeout Configuration
maxWaitTimeout: "30m"                      # Maximum wait time for resource readiness
jobPause: "2m"                             # Pause between job phases

# Node Targeting Configuration (optional)
nodeSelector: ""                           # Node selector for VM placement (e.g., "node-role.kubernetes.io/worker=")

# SSH Configuration for VM Access
privateKey: '/home/kni/.ssh/id_rsa'       # Path to private key for SSH validation
publicKey: '/home/kni/.ssh/id_rsa.pub'    # Path to SSH public key file
vmUser: 'fedora'                           # Username for SSH access to VMs (fedora for Fedora images, cloud-user for CentOS/RHEL)

# Monitoring Configuration (Optional)
esServer: ""  # Elasticsearch server for metrics storage
metadataIndex: "cnv-metadata"                    # Elasticsearch index for run metadata
PROM: ""                                   # Prometheus endpoint (set via environment to enable monitoring)
PROM_TOKEN: ""                             # Prometheus token (set via environment to enable monitoring)

