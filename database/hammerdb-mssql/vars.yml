# HammerDB / MSSQL on Windows — see docs/windows-image-build.md
testNamespace: "cnv-hammerdb-mssql"
testName: "cnv-hammerdb-mssql"
resultsPath: "/tmp/kube-burner-results/hammerdb-mssql"
runTimestamp: "run-default"

vmCount: 1
counter: 1
vmRunning: true

# VM Shape — these values drive both VM creation AND validation expectations
cpuCores: 8
memory: "16Gi"
rootStorage: "80Gi"
dataDisks: 3
diskSize: "100Gi"
storageClassName: "ocs-storagecluster-ceph-rbd"
volumeMode: "Block"

# REQUIRED: full CDI registry URL for your Windows + MSSQL + HammerDB container disk
# windowsImageUrl: "docker://…" or "http(s)://…/your-windows-hammerdb.qcow2"

privateKey: '/home/kni/.ssh/id_rsa'
publicKey: '/home/kni/.ssh/id_rsa.pub'
vmUser: 'Administrator'

maxWaitTimeout: "60m"
jobPause: "5m"
nodeSelector: ""

# Validation Configuration — each toggle enables/disables a check phase
validateOS: true
expectedOS: "Windows Server 2022"
validateSSH: true
validateApps: "MSSQLSERVER"
validateCPU: true
validateMemory: true
validateNICs: true
expectedNICs: 1
initializeDisks: true
validateDisks: true
validateDiskUtil: false
expectedDiskUtilGB: 0
diskUtilTolerancePct: 10
validateDiskUtilAfterProcess: true
waitProcessName: "hammerdb"
waitProcessTimeout: 45
expectedDiskUtilAfterProcessGB: 50

esServer: ""
metadataIndex: "cnv-metadata"
PROM: ""
PROM_TOKEN: ""
